<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Bootstrap Form</title>

<style>
.error-text {
  font-size: 12px;
  color: red;
}
</style>
</head>

<body class="bg-light d-flex justify-content-center p-4">

<div class="card p-4 shadow" style="max-width: 450px; width:100%;">
  <h4>Get started</h4>
  <p class="text-muted">Create your account</p>

  <form id="form">

    <div class="row">
      <div class="col">
        <input id="firstName" class="form-control" placeholder="First name">
        <div class="error-text"></div>
      </div>
      <div class="col">
        <input id="lastName" class="form-control" placeholder="Last name">
        <div class="error-text"></div>
      </div>
    </div>

    <div class="row mt-3">
      <div class="col">
        <select id="month" class="form-select">
          <option value="">Month</option>
          <option>Jan</option>
        </select>
        <div class="error-text"></div>
      </div>
      <div class="col">
        <select id="day" class="form-select">
          <option value="">Day</option>
          <option>1</option>
        </select>
        <div class="error-text"></div>
      </div>
      <div class="col">
        <select id="year" class="form-select">
          <option value="">Year</option>
          <option>2000</option>
        </select>
        <div class="error-text"></div>
      </div>
    </div>

    <div class="mt-3">
      <select id="gender" class="form-select">
        <option value="">Select gender</option>
        <option>Male</option>
      </select>
      <div class="error-text"></div>
    </div>

    <div class="mt-3">
      <input id="contact" class="form-control" placeholder="Email or phone">
      <div class="error-text"></div>
    </div>

    <div class="mt-3">
      <input type="password" id="password" class="form-control" placeholder="Password">
      <div class="error-text"></div>
    </div>

    <button class="btn btn-primary w-100 mt-4">Submit</button>
  </form>
</div>

<script>
const form = document.getElementById("form");

const fields = [
  { el: firstName, validate: v => v.trim() !== "" || "First name required" },
  { el: lastName, validate: v => v.trim() !== "" || "Last name required" },
  { el: month, validate: v => v || "Select month" },
  { el: day, validate: v => v || "Select day" },
  { el: year, validate: v => v || "Select year" },
  { el: gender, validate: v => v || "Select gender" },
  {
    el: contact,
    validate: v => {
      if (!v.trim()) return "Required";
      return /^\S+@\S+\.\S+$/.test(v) || /^[0-9]{7,15}$/.test(v)
        || "Invalid email or phone";
    }
  },
  { el: password, validate: v => v.length >= 6 || "Min 6 chars" }
];

function showError(el, msg) {
  el.classList.add("is-invalid");
  el.nextElementSibling.textContent = msg;
}

function clearError(el) {
  el.classList.remove("is-invalid");
  el.nextElementSibling.textContent = "";
}

function validateField(f) {
  const res = f.validate(f.el.value);
  if (res !== true) return showError(f.el, res), false;
  clearError(f.el);
  return true;
}

// blur
fields.forEach(f => f.el.addEventListener("blur", () => validateField(f)));

// submit (ALL fields)
form.addEventListener("submit", e => {
  e.preventDefault();
  let valid = true;

  fields.forEach(f => {
    if (!validateField(f)) valid = false;
  });

  if (valid) {
    alert("Success!");
    form.reset();
    fields.forEach(f => clearError(f.el));
  }
});
</script>

</body>
</html>
